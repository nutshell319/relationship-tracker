<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我们的故事</title>
  <!-- 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <!-- ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <!-- ECharts WordCloud -->
  <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- 导航栏 -->
    <nav class="nav-bar" v-if="currentView !== 'import'">
      <div class="nav-brand" @click="currentView = 'dashboard'">💕 我们的故事</div>
      <div class="nav-tabs">
        <button :class="{active: currentView === 'dashboard'}" @click="currentView = 'dashboard'">📊 仪表盘</button>
        <button :class="{active: currentView === 'timeline'}" @click="currentView = 'timeline'">⏳ 时间线</button>
      </div>
      <div class="nav-actions">
        <button @click="resetAll" class="btn-ghost">🗑️ 清除数据</button>
      </div>
    </nav>

    <!-- 状态提示条 -->
    <div v-if="statusMsg" class="status-bar" :class="statusType">
      {{ statusMsg }}
      <button @click="statusMsg = ''" style="margin-left:12px;background:none;border:none;cursor:pointer;color:inherit;">✕</button>
    </div>

    <!-- 会话选择页（桌面端默认首页） -->
    <div v-if="currentView === 'sessions'" class="sessions-view">
      <div class="sessions-header">
        <h2>💌 选择要分析的聊天</h2>
        <div class="sessions-status" :class="sessionsStatusType">
          <span v-if="sessionsLoading" class="spinner" style="width:16px;height:16px;border-width:2px;"></span>
          {{ sessionsStatus }}
        </div>
      </div>
      <div>
        <div v-for="s in sessions" :key="s.wxId" class="session-card" @click="selectSession(s.wxId)">
          <div class="avatar">🧑</div>
          <div class="session-info">
            <div class="session-name">{{ s.nickname }}</div>
            <div class="session-meta">📅 {{ s.dateStart }} ~ {{ s.dateEnd }}</div>
          </div>
          <div class="session-count">{{ s.messageCount.toLocaleString() }} 条</div>
          <div class="session-arrow">›</div>
        </div>
      </div>
      <div class="manual-import-section">
        <p>或手动拖入 WeChatMsg 导出的 JSON 文件</p>
        <button class="btn-primary" @click="currentView = 'import'" style="font-size:14px;">📁 导入 JSON 文件</button>
      </div>
    </div>

    <!-- 导入页 -->
    <import-view v-if="currentView === 'import'" @loaded="onDataLoaded"></import-view>

    <!-- 仪表盘 -->
    <dashboard-view v-if="currentView === 'dashboard'"></dashboard-view>

    <!-- 时间线 -->
    <timeline-view v-if="currentView === 'timeline'"></timeline-view>

    <!-- 加载遮罩 -->
    <div v-if="loading" class="loading-overlay">
      <div class="spinner"></div>
      <p style="color:var(--text-secondary);">{{ loadingMsg }}</p>
    </div>
  </div>

  <!-- JS 模块（按依赖顺序） -->
  <script src="js/storage.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/desktop.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
